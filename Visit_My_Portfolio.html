<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visit Thejaswini P's Developer Portfolio</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #090d16 0%, #0f172a 100%);
      --card-bg: rgba(15, 23, 42, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-glow: rgba(59, 130, 246, 0.3);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Ambient glow elements */
    .glow-sphere {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.5;
    }

    .glow-1 {
      top: 15%;
      left: 15%;
      width: 350px;
      height: 350px;
      background: rgba(59, 130, 246, 0.15);
      animation: float 8s ease-in-out infinite alternate;
    }

    .glow-2 {
      bottom: 15%;
      right: 15%;
      width: 400px;
      height: 400px;
      background: rgba(14, 165, 233, 0.12);
      animation: float 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-20px) scale(1.05); }
    }

    /* Card Layout */
    .container {
      position: relative;
      z-index: 10;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 48px 40px;
      border-radius: 24px;
      text-align: center;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .avatar-frame {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary) 0%, #0ea5e9 100%);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
    }

    .avatar-text {
      font-size: 28px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .description {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Standalone launcher button opening live site in new tab */
    .visit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px 28px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      border-radius: 12px;
      box-shadow: 0 8px 16px var(--primary-glow);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .visit-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.4);
      transform: translateY(-2px);
    }

    .visit-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <!-- Ambient background elements -->
  <div class="glow-sphere glow-1"></div>
  <div class="glow-sphere glow-2"></div>

  <div class="container">
    <div class="avatar-frame">
      <div class="avatar-text">TP</div>
    </div>
    
    <h1>Thejaswini P</h1>
    <div class="subtitle">Live Developer Portfolio</div>
    
    <p class="description">
      Click below to launch your deployed developer portfolio in a new browser tab.
    </p>

    <!-- Visit Portfolio button targetting live surge URL -->
    <a href="https://thejaswinip-portfolio.surge.sh" target="_blank" rel="noopener noreferrer" class="visit-btn">
      Visit My Portfolio
    </a>
  </div>
</body>
</html>
